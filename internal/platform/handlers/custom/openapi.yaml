openapi: 3.0.3
info:
  title: PDAccess Core Service - OpenAPI 3.0
  description: |-
    Core services for PDAccess.
  termsOfService: http://www.pdaccess.com/terms/
  contact:
    email: support@pdaccess.com
  version: 0.0.1
externalDocs:
  description: Find out more about Swagger
  url: http://www.pdaccess.com
servers:
  - url: /api/v1/ws
tags:
  - name: service
    description: Service data related endpoints
  - name: group
    description: Group and membership management
  - name: config
    description: Realm based configuration management
  - name: alarm
    description: Alarm configuration and listing
  - name: snippet
    description: Secure Copy Paste service
paths:
  /service:
    post:
      tags:
        - service
      summary: New Service
      description: Create Service for related types/os/versions
      operationId: newService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /service/index:
    post:
      tags:
        - service
      summary: Search Service
      description: Search service for logged user
      operationId: searchService
      parameters:
        - name: group
          in: query
          description: Group Id
          required: false
          explode: true
          schema:
            type: string
        - name: delete
          in: query
          description: Show deleted Service
          required: false
          explode: true
          schema:
            type: boolean
        - name: limit
          in: query
          description: limit count of results
          required: false
          schema:
            type: integer
            format: int32
        - name: offset
          in: query
          description: offset of the page count
          required: false
          schema:
            type: integer
            format: int32

        - name: startDate
          in: query
          description: start date of log range
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: end date of log range
          required: false
          schema:
            type: string
            format: date-time

        - name: filter
          in: query
          description: Filter string for service data. For example name, ip address or port number
          required: false
          explode: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceSearchResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /service/{service}:
    get:
      tags:
        - service
      summary: Find service by id
      description: Returns a single service info
      operationId: serviceById
      parameters:
        - name: service
          in: path
          description: ID of service to return
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleServiceResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: Service not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    post:
      tags:
        - service
      summary: Update a service
      description: Single service update logic
      operationId: serviceUpdate
      parameters:
        - name: service
          in: path
          description: ID of service that needs to be updated
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      tags:
        - service
      summary: Deletes a service
      description: delete a service using soft delete
      operationId: deleteService
      parameters:
        - name: service
          in: path
          description: service id to delete
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /service/{service}/message:
