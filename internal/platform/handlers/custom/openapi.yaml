components:
  schemas:
    AccessProtocol:
      type: string
      description: When you want to connect a service using pdaccess, you must give procol type. none means don't want to use proxy access for this service
      enum:
        - "ssh"
        - "sql"
        - "vnc"
        - "rdp"
        - "http"
        - "none"
    AuthProtocol:
      type: string
      description: one of protocol is used for authenticate service.
      enum:
        - "radius"
        - "oauth2"
        - "ldap"
        - "tacacs"
        - "none"
    CreateServiceRequest:
      type: object
      description: Service is a main artifact for pdaccess.
      required:
        - name
        - groupId
        - accessProtocol
        - authProtocol
        - vendor
        - host
      properties:
        name:
          type: string
          example: new server
        description:
          type: string
          example: new server description
        groupId:
          type: string
          format: uuid
          example: 4ff2d0ee-5479-433e-84c0-f6f8f44a8f50
        accessProtocol:
          $ref: "#/components/schemas/AccessProtocol"
          example: ssh
        authProtocol:
          $ref: "#/components/schemas/AuthProtocol"
          example: radius
        vendor:
          type: string
          description: Name of the service type
          example: Redhat
        version:
          type: string
          description: Version of the service
          example: 9
        host:
          type: string
          example: demo.pdaccess.com
          description: host parameter can be ip or hostname.
        port:
          type: integer
          format: int32
          example: 22

    CreateServiceResponse:
      type: object
      description: seviceId is used in many places to get service data
      properties:
        serviceId:
          type: string
          format: uuid
          example: 6e896583-cefd-498b-ab52-3099bf706d83
    SingleServiceResponse:
      type: object
      properties:
        serviceId:
          type: string
    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        serviceType:
          type: string
        serviceOs:
          type: string
    UpdateServiceResponse:
      type: object
      properties:
        name:
          type: string
    ServiceSearchResponse:
      type: object
      properties:
        serviceId:
          type: string
        name:
          type: string
        description:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Message of the day
          description: Daily message content
    CreateGroupRequest:
      type: object
      description: Group is a main object for management in pdaccess. you can create many of object with realted with group. Credentails, Policies, Messages, Alarms etc.
      required:
        - name
        - description
      properties:
        parent:
          type: string
        name:
          type: string
        description:
          type: string
    CreateGroupResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
          example: 4ff2d0ee-5479-433e-84c0-f6f8f44a8f50
          description: this field return uuid v4 of group id
    Group:
      type: object
      required:
        - groupId
        - name
        - description
      properties:
        groupId:
          type: string
          format: uuid
          example: 4ff2d0ee-5479-433e-84c0-f6f8f44a8f50
        name:
          type: string
          example: Default_Group
        description:
          type: string
          example: Default_Group Description
        parent:
          type: string
          format: uuid
          example: 7d6586ec-3710-4db9-8f5c-bddf2c2721f4
          description: parent group of the group. Each group might have a parent group. we allow only 3 level of parent groups.
    GroupSearchResponse:
      type: array
      items:
        $ref: "#/components/schemas/Group"
    SingleGroupResponse:
      allOf:
        - $ref: "#/components/schemas/Group"

    GroupMemberType:
      type: string
      description: Group Membership Type
      enum:
        - "user"
        - "admin"

    GroupMemberRequest:
      type: object
      description: New Group Member Request. userId and role is required.
      required:
        - userId
        - role
      properties:
        userId:
          type: string
          format: uuid
          example: 06380166-fd45-450e-9c8c-51a69dd2e97c
        role:
          $ref: "#/components/schemas/GroupMemberType"
          example: user

    GroupMemeberItem:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          example: 06380166-fd45-450e-9c8c-51a69dd2e97c
        role:
          type: string
          example: user
        membershipTime:
          type: string
          format: time
          example: 2006-01-02T15:04:05Z07:00
          description: time format for RFC3339

    GroupMemebersResponse:
      type: array
      items:
        $ref: "#/components/schemas/GroupMemeberItem"

    GroupMemberDeleteRequest:
      type: array
      description: userIds of member to remove from group
      items:
        type: string
        example: 06380166-fd45-450e-9c8c-51a69dd2e97c

    GroupMessage:
      type: object
      required:
        - content
        - startTime
        - endTime
      properties:
        content:
          type: string
        backgroundColor:
          type: string
        fontColor:
          type: string
        fontSize:
          type: integer
          format: int32
        startTime:
          type: string
          format: time
          example: 2006-01-02T15:04:05Z07:00
          description: time format for RFC3339
        endTime:
          type: string
          format: time
          example: 2006-01-03T15:04:05Z07:00
          description: time format for RFC3339
    GroupMessageRequest:
      allOf:
        - $ref: "#/components/schemas/GroupMessage"
    GroupMessagesResponse:
      type: array
      items:
        $ref: "#/components/schemas/GroupMessage"
    Alarm:
      type: object
      properties:
        name:
          type: string
        pattern:
          type: string
    AlarmCreateRequest:
      allOf:
        - $ref: "#/components/schemas/Alarm"
    GroupAlarmItem:
      allOf:
        - $ref: "#/components/schemas/Alarm"
      properties:
        alarmId:
          type: string
          format: uuid
    GroupAlarmsResponse:
      type: array
      items:
        $ref: "#/components/schemas/GroupAlarmItem"
    SnippetRequest:
      type: object
      properties:
        content:
          type: string
    SnippetResponse:
      type: object
      properties:
        content:
          type: string
    SearchSnippetResponse:
      type: array
      items:
        $ref: "#/components/schemas/SnippetResponse"

    ConfigContext:
      type: object
      description: config context is a key and value data for each config enries. we return string value version of config entry.
      properties:
        entry:
          type: string
          example: "console-logo"
        value:
          type: string
          example: "base64 encoded image"

    ConfigContextResponse:
      type: array
      items:
        $ref: "#/components/schemas/ConfigContext"

    ConfigContextRequest:
      type: array
      items:
        $ref: "#/components/schemas/ConfigContext"

    AlarmItem:
      properties:
        serviceId:
          type: string
        userId:
          type: string
        action:
          type: string
        createTime:
          type: string
          format: time
          example: 2006-01-03T15:04:05Z07:00
          description: time format for RFC3339

    AlarmsResponse:
      type: array
      items:
        $ref: "#/components/schemas/AlarmItem"
    ApiResponse:
      type: object
      description: Api generic response for success or error responses
      required:
        - requestId
      properties:
        code:
          type: string
        type:
          type: string
        message:
          type: string
        requestId:
          type: string
          format: uuid
          example: a88b3909-f139-455c-9e38-ce53beb939bc
